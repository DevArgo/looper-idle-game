<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Idle Game - Terminal/Synthwave</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="synthwave-theme">
    <div id="game-dashboard">
        <header class="main-header">
            <h1>> SYSTEM_CORE: IDLE_DEV_v2.0</h1>
            <div id="stats-panel" class="neumorphic-panel">
                <div class="stat-item">
                    <span class="label">Lines of Code:</span>
                    <span id="loc-display" class="value">0</span>
                </div>
                <div class="stat-item">
                    <span class="label">LoC / second:</span>
                    <span id="lps-display" class="value">0</span>
                </div>
            </div>
        </header>
        
        <main class="action-area">
            <div id="terminal-section" class="neumorphic-panel">
                <div class="terminal-header">
                    <span class="dot red"></span>
                    <span class="dot yellow"></span>
                    <span class="dot green"></span>
                    <span class="title">bash -- write_code.sh</span>
                </div>
                <div class="terminal-body">
                    <button id="write-code-btn" class="neumorphic-btn">
                        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" class="icon"><polyline points="16 18 22 12 16 6"></polyline><polyline points="8 6 2 12 8 18"></polyline></svg>
                        <span>WRITE_CODE();</span>
                    </button>
                    <p class="hint">Hotkeys: [SPACE] or [ENTER]</p>
                </div>
            </div>
        </main>

        <aside class="upgrades-sidebar">
            <h2 class="section-title">UPGRADES_SYSTEM</h2>
            <div id="upgrades-list">
                <div id="junior-dev-upgrade" class="upgrade-item neumorphic-panel" data-tooltip="Hires a Junior Developer to write 1 LoC per second.">
                    <div class="upgrade-info">
                        <div class="upgrade-header">
                            <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" class="icon"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                            <span class="upgrade-name">Junior Developer</span>
                        </div>
                        <span id="junior-dev-count" class="upgrade-count">0</span>
                    </div>
                    <div class="upgrade-controls">
                        <span class="cost-label">Cost: <span id="junior-dev-cost">10</span> LoC</span>
                        <button id="buy-junior-dev-btn" class="neumorphic-btn-small">HIRE</button>
                    </div>
                </div>
            </div>
        </aside>

        <footer class="game-footer">
            <p id="status-message">SYSTEM ONLINE</p>
        </footer>
    </div>

    <div id="toast-container"></div>
    <div id="tooltip" class="tooltip hidden"></div>

    <script src="main.js"></script>
</body>
</html>
