<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Idle Game</title>
</head>
<body>
    <h1>IT Idle Game</h1>
    <div id="game-container">
        <p>Lines of Code: <span id="loc-display">0</span></p>
        <button id="write-code-btn">Write Code</button>

        <div id="upgrades-container">
            <h2>Upgrades</h2>
            <div id="junior-dev-upgrade">
                <p>Junior Developers: <span id="junior-dev-count">0</span></p>
                <p>Cost: <span id="junior-dev-cost">10</span> LoC</p>
                <button id="buy-junior-dev-btn">Buy Junior Developer</button>
            </div>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
