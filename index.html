<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Idle Game - Console Edition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <h1>IT Idle Game</h1>
        <div id="stats-section">
            <p>Lines of Code: <span id="loc-display">0</span></p>
        </div>
        
        <div id="action-section">
            <button id="write-code-btn">Write Code</button>
        </div>

        <div id="upgrades-container">
            <h2>System Upgrades</h2>
            <div id="junior-dev-upgrade" class="upgrade-item">
                <p>Junior Developers: <span id="junior-dev-count">0</span></p>
                <p>Requirement: <span id="junior-dev-cost">10</span> LoC</p>
                <button id="buy-junior-dev-btn">Hire Junior Developer</button>
            </div>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
